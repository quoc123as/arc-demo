
<!DOCTYPE html>
<html>
<head>
  <title>NFT Marketplace</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px;
      border-radius: 8px;
      color: white;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>RWA NFT Marketplace</h1>

<div class="grid">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>House #001</h3>
    <p>100 USDC</p>
    <button onclick="buyNFT('House')">Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Gold #002</h3>
    <p>50 USDC</p>
    <button onclick="buyNFT('Gold')">Buy</button>
  </div>

</div>

<script>
function buyNFT(name) {
  alert("Bought " + name);
}
</script>

</body>
</html>
