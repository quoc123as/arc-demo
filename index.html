<!DOCTYPE html>
<html>
<head>
  <title>Send NFT & USDC</title>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin: 20px auto;
      max-width: 400px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Send NFT & USDC (Testnet)</h2>

<div>
  <span id="wallet">Not connected</span><br>
  <button onclick="connectWallet()">Connect Wallet</button>
</div>

<div class="box">
  <h3>Send NFT</h3>
  <input id="nftTo" placeholder="Recipient address" />
  <input id="tokenId" placeholder="Token ID (try: 1)" />
  <button onclick="sendNFT()">Send NFT</button>
</div>

<div class="box">
  <h3>Send USDC</h3>
  <input id="usdcTo" placeholder="Recipient address" />
  <input id="amount" placeholder="Amount (e.g 1)" />
  <button onclick="sendUSDC()">Send USDC</button>
</div>

<script>
let signer;

// 🔥 ĐÃ ĐIỀN SẴN (Sepolia testnet)
const NFT_ADDRESS = "0x8C1e9F7D9B0A8B3F6A2E2A8E5D7E8F1234567890"; // demo
const USDC_ADDRESS = "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238"; // USDC Sepolia

const nftAbi = [
  "function safeTransferFrom(address from, address to, uint256 tokenId)"
];

const erc20Abi = [
  "function transfer(address to, uint amount) returns (bool)",
  "function decimals() view returns (uint8)"
];

async function connectWallet() {
  const provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();

  const addr = await signer.getAddress();
  document.getElementById("wallet").innerText = addr;
}

async function sendNFT() {
  if (!signer) return alert("Connect wallet first");

  const to = document.getElementById("nftTo").value;
  const tokenId = document.getElementById("tokenId").value;

  const contract = new ethers.Contract(NFT_ADDRESS, nftAbi, signer);
  const from = await signer.getAddress();

  const tx = await contract.safeTransferFrom(from, to, tokenId);
  await tx.wait();

  alert("NFT sent!");
}

async function sendUSDC() {
  if (!signer) return alert("Connect wallet first");

  const to = document.getElementById("usdcTo").value;
  const amount = document.getElementById("amount").value;

  const contract = new ethers.Contract(USDC_ADDRESS, erc20Abi, signer);

  const decimals = await contract.decimals();
  const value = ethers.utils.parseUnits(amount, decimals);

  const tx = await contract.transfer(to, value);
  await tx.wait();

  alert("USDC sent!");
}
</script>

</body>
</html>
