<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Send NFT & USDC</title>

  <!-- ethers -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      font-family: Arial;
      margin: 0;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .wallet-box {
      text-align: center;
      margin-bottom: 20px;
    }

    .wallet-box span {
      display: block;
      margin-bottom: 10px;
      color: #94a3b8;
    }

    .box {
      background: rgba(30, 41, 59, 0.8);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #020617;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🚀 Send NFT & USDC</h2>

  <div class="wallet-box">
    <span id="wallet">Not connected</span>
    <button onclick="connectWallet()">Connect Wallet</button>
  </div>

  <div class="box">
    <h3>🖼 Send NFT</h3>
    <input id="nftTo" placeholder="Recipient address">
    <input id="tokenId" placeholder="Token ID (vd: 1)">
    <button onclick="sendNFT()">Send NFT</button>
  </div>

  <div class="box">
    <h3>💵 Send USDC</h3>
    <input id="usdcTo" placeholder="Recipient address">
    <input id="amount" placeholder="Amount (vd: 1)">
    <button onclick="sendUSDC()">Send USDC</button>
  </div>

  <div id="status" class="status"></div>

</div>

<script>
let signer;

// ⚠️ Demo address (có thể không gửi được NFT thật)
const NFT_ADDRESS = "0x0000000000000000000000000000000000000000";

// USDC Sepolia (chuẩn)
const USDC_ADDRESS = "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238";

const nftAbi = [
  "function safeTransferFrom(address from, address to, uint256 tokenId)"
];

const erc20Abi = [
  "function transfer(address to, uint amount) returns (bool)",
  "function decimals() view returns (uint8)"
];

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

// connect ví
async function connectWallet() {
  try {
    if (!window.ethereum) {
      alert("Cài MetaMask");
      return;
    }

    const provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();

    const addr = await signer.getAddress();
    document.getElementById("wallet").innerText = addr;

    setStatus("✅ Connected");
  } catch (e) {
    setStatus("❌ Lỗi connect ví");
  }
}

// gửi NFT
async function sendNFT() {
  try {
    if (!signer) {
      alert("Connect wallet trước");
      return;
    }

    setStatus("Sending NFT...");

    const to = document.getElementById("nftTo").value;
    const tokenId = document.getElementById("tokenId").value;

    const contract = new ethers.Contract(NFT_ADDRESS, nftAbi, signer);
    const from = await signer.getAddress();

    const tx = await contract["safeTransferFrom(address,address,uint256)"](from, to, tokenId);
    await tx.wait();

    setStatus("✅ NFT sent!");
  } catch (e) {
    console.log(e);
    setStatus("❌ Không gửi được NFT (chưa có NFT hoặc sai contract)");
  }
}

// gửi USDC
async function sendUSDC() {
  try {
    if (!signer) {
      alert("Connect wallet trước");
      return;
    }

    setStatus("Sending USDC...");

    const to = document.getElementById("usdcTo").value;
    const amount = document.getElementById("amount").value;

    const contract = new ethers.Contract(USDC_ADDRESS, erc20Abi, signer);

    const decimals = await contract.decimals();
    const value = ethers.utils.parseUnits(amount, decimals);

    const tx = await contract.transfer(to, value);
    await tx.wait();

    setStatus("✅ USDC sent!");
  } catch (e) {
    console.log(e);
    setStatus("❌ Không gửi được USDC (chưa có token)");
  }
}
</script>

</body>
</html>
