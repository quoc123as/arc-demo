<!DOCTYPE html>
<html>
<head>
  <title>RWA NFT Marketplace</title>

  <!-- ethers -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #020617;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .section {
      padding: 20px;
    }
  </style>
</head>
